<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Going Green — Studio Sustainability Field Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Light editorial theme. Green is still earned on the meter. */
    --stage:#f4efe5;        /* warm paper background */
    --stage-2:#ffffff;      /* white raised surface */
    --stage-3:#fcf9f2;      /* card */
    --line:#e4dccd;         /* light hairline */
    --tungsten:#2c2620;     /* ink text */
    --dim:#6e6557;          /* muted text */
    --dimmer:#9a9080;
    --key:#cd7a26;          /* amber accent (high-impact end) */
    --fill:#2c8ea0;         /* teal accent */
    --green:#3aa256;        /* sustainable end of meter */
    --green-deep:#2c8a47;
    --rec:#e5563f;
    --focus:#2c8ea0;
    --radius:14px;
    --mono:"Space Mono", ui-monospace, "SF Mono", "Cascadia Mono", Menlo, monospace;
    --disp:"Space Grotesk", system-ui, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(120% 80% at 50% 0%, #fbf8f1 0%, var(--stage) 60%);
    color:var(--tungsten);
    font-family:var(--disp);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  button{font-family:inherit}
  ::selection{background:var(--key);color:#fff}

  /* ---------- Viewfinder frame ---------- */
  #app{
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #camera{
    position:fixed; inset:0; width:100%; height:100%;
    object-fit:cover; z-index:0; opacity:0;
    transition:opacity .5s ease;
    transform:scaleX(1);
  }
  body.ar #camera{opacity:.55}
  #scrim{
    position:fixed; inset:0; z-index:1; pointer-events:none; background:none;
  }
  body.ar #scrim{background:radial-gradient(140% 100% at 50% 40%, transparent 35%, rgba(20,17,15,.75) 100%)}
  /* viewfinder corner ticks */
  .ticks{position:fixed; inset:14px; z-index:2; pointer-events:none; opacity:0}
  body.ar .ticks{opacity:1}
  .ticks span{position:absolute;width:22px;height:22px;border:2px solid rgba(237,230,216,.5)}
  .ticks .tl{top:0;left:0;border-right:0;border-bottom:0}
  .ticks .tr{top:0;right:0;border-left:0;border-bottom:0}
  .ticks .bl{bottom:0;left:0;border-right:0;border-top:0}
  .ticks .br{bottom:0;right:0;border-left:0;border-top:0}

  .layer{position:relative; z-index:3; display:flex; flex-direction:column; height:100%; min-height:0}

  /* ---------- Top status bar ---------- */
  .hud{
    display:flex; align-items:center; gap:12px;
    padding:13px 18px; font-family:var(--mono); font-size:12px;
    letter-spacing:.04em; color:var(--dim);
    border-bottom:1px solid var(--line);
    background:rgba(255,255,255,.85);
    backdrop-filter:blur(8px);
  }
  body.ar .hud{background:linear-gradient(rgba(20,17,15,.85), rgba(20,17,15,.4));color:#ede6d8}
  body.ar .hud .who,body.ar .hud .rec{color:#fff}
  .rec{display:flex;align-items:center;gap:7px;color:var(--tungsten)}
  .rec b{width:9px;height:9px;border-radius:50%;background:var(--rec);box-shadow:0 0 8px var(--rec);animation:blink 1.6s infinite}
  @keyframes blink{0%,60%{opacity:1}80%,100%{opacity:.25}}
  .hud .who{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--tungsten);font-weight:700}
  .hud .prog{color:var(--green-deep);font-weight:700}
  .hud .tc{color:var(--dimmer)}

  /* ---------- Scroll body ---------- */
  .scroll{flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch}
  .wrap{max-width:780px; margin:0 auto; padding:22px 18px 130px}

  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--key)}
  h1{font-size:clamp(30px,7vw,46px);line-height:.98;margin:.35em 0 .25em;font-weight:700;letter-spacing:-.01em}
  h2{font-size:22px;margin:.2em 0 .5em;font-weight:600;letter-spacing:-.01em}
  p.lede{color:var(--dim);font-size:16px;line-height:1.55;max-width:56ch}
  .small{font-size:13px;color:var(--dim);line-height:1.5}

  /* ---------- Onboarding ---------- */
  .brand{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .brand .meter-emblem{
    font-family:var(--mono);font-size:12px;color:var(--green);
    border:1px solid var(--green-deep);border-radius:999px;padding:5px 11px;letter-spacing:.12em;
  }
  /* home hero */
  .hero{position:relative;border-radius:18px;overflow:hidden;padding:26px 24px 24px;margin-bottom:18px;
    background:
      radial-gradient(120% 140% at 90% -25%, rgba(44,142,160,.18), transparent 55%),
      radial-gradient(120% 150% at -5% 120%, rgba(58,162,86,.20), transparent 55%),
      #ffffff;
    border:1px solid var(--line); box-shadow:0 12px 30px -18px rgba(60,50,35,.45)}
  .hero .gels{display:flex;gap:6px;margin-bottom:14px}
  .hero .gels i{width:28px;height:9px;border-radius:3px}
  .hero h1{font-size:clamp(34px,8.5vw,52px);margin:.1em 0 .18em;color:var(--tungsten)}
  .hero .tagline{color:var(--dim);font-size:15.5px;line-height:1.55;max-width:52ch;margin:0}
  .steps{display:flex;gap:10px;margin:2px 0 0;flex-wrap:wrap}
  .steps .st{flex:1;min-width:150px;background:var(--stage-2);border:1px solid var(--line);border-radius:12px;padding:12px 13px}
  .steps .st .n{font-family:var(--mono);font-size:11px;color:var(--key);letter-spacing:.1em}
  .steps .st .d{font-size:13px;color:var(--dim);line-height:1.4;margin-top:3px}
  .field{margin:16px 0}
  label.lab{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:7px}
  input[type=text]{
    width:100%;background:var(--stage-2);border:1px solid var(--line);color:var(--tungsten);
    border-radius:10px;padding:13px 14px;font-size:16px;font-family:var(--disp);
  }
  input[type=text]:focus{outline:2px solid var(--focus);outline-offset:1px;border-color:transparent}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:430px){.row2{grid-template-columns:1fr}}

  .btn{
    appearance:none;border:1px solid var(--line);background:#fff;color:var(--tungsten);
    border-radius:11px;padding:14px 18px;font-size:15px;font-weight:600;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:9px;transition:transform .08s ease,border-color .2s,background .2s,box-shadow .2s;
    box-shadow:0 1px 3px rgba(60,50,35,.10);
  }
  .btn:hover{border-color:var(--dimmer);background:#fbf8f1}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:linear-gradient(180deg,#3fb061,#2c9148);border:1px solid #2c8a47;color:#fff;font-weight:700;font-size:16px;
    box-shadow:0 10px 22px -8px rgba(44,145,72,.6), inset 0 1px 0 rgba(255,255,255,.25)}
  .btn.primary:hover{background:linear-gradient(180deg,#48bd6b,#308f4d);border-color:#2c8a47}
  .btn.key{background:rgba(205,122,38,.08);border-color:var(--key);color:var(--key)}
  .btn.block{width:100%}
  .btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
  .btn:focus-visible{outline:2px solid var(--focus);outline-offset:2px}

  /* ---------- Station hub ---------- */
  .toolbar{display:flex;gap:10px;align-items:center;margin:6px 0 18px;flex-wrap:wrap}
  .toggle{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .toggle button{background:transparent;border:0;color:var(--dim);padding:9px 16px;font-family:var(--mono);font-size:12px;letter-spacing:.08em;cursor:pointer}
  .toggle button[aria-pressed=true]{background:var(--tungsten);color:#fff}
  .codejump{margin-left:auto;display:flex;gap:8px;align-items:center}
  .codejump input{width:84px;text-align:center;font-family:var(--mono);background:var(--stage-2);border:1px solid var(--line);color:var(--tungsten);border-radius:9px;padding:9px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:600px){.grid{grid-template-columns:1fr}}

  /* station card */
  .slate{
    text-align:left;cursor:pointer;border:1px solid var(--line);border-radius:16px;
    background:#ffffff;padding:0;overflow:hidden;
    transition:border-color .2s,transform .12s,box-shadow .2s;
    display:flex;flex-direction:column;box-shadow:0 6px 18px -10px rgba(60,50,35,.35);
    position:relative;
  }
  .slate::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--ac,#cd7a26)}
  .slate:hover{border-color:var(--ac,#cd7a26);transform:translateY(-4px);box-shadow:0 18px 32px -14px rgba(60,50,35,.4)}
  .slate:active{transform:translateY(-1px)}
  .slate .stripe{display:flex;height:12px;margin-left:5px}
  .slate .stripe i{flex:1}
  .slate .stripe i:nth-child(odd){background:#2c2620}
  .slate .stripe i:nth-child(even){background:#efe7d6}
  .slate .body{padding:18px 18px 18px 20px}
  .slate .htop{display:flex;align-items:center;gap:13px}
  .slate .ic{width:54px;height:54px;flex:none;border-radius:13px;display:grid;place-items:center;font-size:28px;
    background:#f6efe2;border:1px solid var(--line);
    background:color-mix(in srgb, var(--ac,#cd7a26) 14%, #ffffff);border-color:color-mix(in srgb,var(--ac,#cd7a26) 35%, transparent)}
  .slate .code{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--ac,var(--key))}
  .slate h3{margin:4px 0 0;font-size:19px;font-weight:600;letter-spacing:-.01em;line-height:1.12}
  .slate .tag{font-size:14px;color:var(--dim);line-height:1.5;margin-top:12px}
  .slate .foot{display:flex;align-items:center;gap:8px;margin-top:16px;font-family:var(--mono);font-size:11px;color:var(--dimmer)}
  .slate .open{margin-left:auto;font-family:var(--mono);font-size:12px;letter-spacing:.06em;color:var(--ac,#cd7a26);font-weight:700}
  .chip{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;padding:4px 10px;border-radius:999px;border:1px solid var(--line)}
  .chip.done{color:#fff;background:var(--green-deep);border-color:var(--green-deep);font-weight:700}
  .chip.todo{color:var(--dim)}

  /* ---------- Station detail ---------- */
  .back{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);color:var(--dim);
    font-family:var(--mono);font-size:12px;letter-spacing:.05em;cursor:pointer;padding:9px 14px;border-radius:999px;margin-bottom:14px;
    box-shadow:0 1px 3px rgba(60,50,35,.1);transition:border-color .2s,color .2s,background .2s}
  .back:hover{border-color:var(--dimmer);color:var(--tungsten);background:#fbf8f1}
  .panel{background:var(--stage-2);border:1px solid var(--line);border-radius:var(--radius);padding:16px 17px;margin:14px 0}
  .panel h4{margin:0 0 7px;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
  .panel p{margin:0;color:var(--tungsten);line-height:1.55;font-size:15px}
  .panel.impact{border-left:3px solid var(--key)}
  .panel.lever{border-left:3px solid var(--green-deep)}

  .q{margin:22px 0}
  .q .qn{font-family:var(--mono);font-size:11px;color:var(--key);letter-spacing:.12em}
  .q .qt{font-size:16px;font-weight:600;margin:6px 0 12px;line-height:1.4}
  .opt{
    display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;cursor:pointer;
    background:var(--stage-2);border:1px solid var(--line);border-radius:11px;padding:13px 14px;margin-bottom:9px;color:var(--tungsten);
    transition:border-color .15s,background .15s;
  }
  .opt:hover{border-color:var(--dimmer)}
  .opt .mk{flex:none;width:20px;height:20px;border-radius:50%;border:2px solid var(--dimmer);margin-top:1px;display:grid;place-items:center;font-size:11px;color:var(--stage)}
  .opt[aria-pressed=true]{border-color:var(--green-deep);background:rgba(63,157,82,.1)}
  .opt[aria-pressed=true] .mk{background:var(--green);border-color:var(--green)}
  .opt[aria-pressed=true] .mk::after{content:"✓"}
  .opt .ot{font-size:14.5px;line-height:1.4}
  .opt .note{display:block;font-size:12.5px;color:var(--dim);margin-top:3px}

  textarea{
    width:100%;min-height:90px;resize:vertical;background:var(--stage-2);border:1px solid var(--line);
    color:var(--tungsten);border-radius:11px;padding:13px 14px;font-size:15px;font-family:var(--disp);line-height:1.5;
  }
  textarea:focus{outline:2px solid var(--focus);outline-offset:1px;border-color:transparent}

  /* ---------- Impact meter (the signature) ---------- */
  .meter{margin:20px 0 4px}
  .meter .scale{position:relative;height:14px;border-radius:999px;overflow:hidden;border:1px solid var(--line);
    background:linear-gradient(90deg,var(--key),#d9c25a 45%,var(--green) 100%)}
  .meter .needle{position:absolute;top:-6px;width:3px;height:26px;background:var(--tungsten);border-radius:2px;
    box-shadow:0 0 0 2px var(--stage);transition:left .5s cubic-bezier(.2,.8,.2,1)}
  .meter .ends{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--dim);margin-top:9px}
  .meter .read{font-family:var(--mono);font-size:13px;color:var(--tungsten);margin-top:10px;display:flex;justify-content:space-between}
  .meter .read b{color:var(--green);font-weight:700}
  input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:999px;background:var(--line);margin:18px 0 6px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--green);border:3px solid var(--stage);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--green);border:3px solid var(--stage);cursor:pointer}

  /* ---------- Bottom action bar ---------- */
  .dock{
    position:absolute;left:0;right:0;bottom:0;z-index:5;
    padding:13px 16px calc(13px + env(safe-area-inset-bottom));
    background:rgba(255,255,255,.94);
    border-top:1px solid var(--line); backdrop-filter:blur(10px);
    box-shadow:0 -8px 22px -16px rgba(60,50,35,.4);
    display:flex;gap:11px;align-items:center;
  }
  .dock .grow{flex:1}

  /* ---------- Summary ---------- */
  .bigscore{display:flex;align-items:baseline;gap:14px;margin:10px 0 4px}
  .bigscore .n{font-family:var(--mono);font-size:64px;font-weight:700;line-height:1;color:var(--green)}
  .bigscore .d{color:var(--dim);font-family:var(--mono);font-size:14px}
  .ledger{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin:16px 0}
  .ledger .lr{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 15px;border-bottom:1px solid var(--line);font-size:14px}
  .ledger .lr:last-child{border-bottom:0}
  .ledger .lr .nm{color:var(--tungsten)}
  .ledger .lr .vv{font-family:var(--mono);font-size:12px;color:var(--green)}
  .ledger .lr .vv.miss{color:var(--dimmer)}

  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);z-index:30;
    background:var(--stage-3);border:1px solid var(--green-deep);color:var(--tungsten);padding:12px 18px;border-radius:11px;
    font-size:14px;opacity:0;pointer-events:none;transition:.3s;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{border-color:var(--key)}

  details.setup{margin-top:20px;border:1px dashed var(--line);border-radius:11px;padding:0 14px}
  details.setup summary{cursor:pointer;padding:13px 0;font-family:var(--mono);font-size:12px;letter-spacing:.06em;color:var(--dim)}
  details.setup code{background:#0c0a08;padding:1px 6px;border-radius:5px;font-size:12px;color:var(--green)}
  details.setup p{font-size:13px;color:var(--dim);line-height:1.6}

  /* ---------- Location Shoot game ---------- */
  .gamehero{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:
     linear-gradient(180deg, rgba(82,182,196,.14), rgba(20,17,15,.2)), var(--stage-2);padding:20px 18px;margin:8px 0 16px}
  .gamehero .premise{font-size:15px;color:var(--tungsten);line-height:1.55}
  .marker-rail{display:flex;gap:6px;margin:14px 0 2px}
  .marker-rail i{flex:1;height:6px;border-radius:99px;background:var(--line)}
  .marker-rail i.on{background:var(--green)}
  .marker-rail i.cur{background:var(--key)}
  .vs{display:grid;gap:12px;margin:14px 0}
  .vbar{background:var(--stage-2);border:1px solid var(--line);border-radius:11px;padding:12px 13px}
  .vbar .top{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--dim);margin-bottom:8px}
  .vbar .top b{color:var(--tungsten)}
  .vbar .track{position:relative;height:16px;border-radius:99px;background:#0c0a08;overflow:hidden}
  .vbar .barfill{height:100%;border-radius:99px;transition:width .55s cubic-bezier(.2,.8,.2,1)}
  .vbar.loc .barfill{background:linear-gradient(90deg,var(--green),#d9c25a 55%,var(--key))}
  .vbar.vp .barfill{background:var(--fill)}
  .vbar .vpline{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--tungsten);opacity:.8}
  .pts{font-family:var(--mono);font-size:13px;color:var(--green)}
  .feedback{margin-top:6px;padding:11px 13px;border-radius:10px;background:rgba(63,157,82,.1);border:1px solid var(--green-deep);font-size:13.5px;line-height:1.45;color:var(--tungsten)}
  .feedback .p{font-family:var(--mono);color:var(--green);font-weight:700;margin-right:6px}
  .opt .pe{flex:none;font-family:var(--mono);font-size:11px;color:var(--dim);align-self:center}
  .verdict{font-size:15px;line-height:1.55;color:var(--tungsten);margin:6px 0}
  .kicker{border-left:3px solid var(--fill);background:var(--stage-2);border:1px solid var(--line);border-left-width:3px;border-radius:11px;padding:14px 15px;margin:14px 0;font-size:14px;line-height:1.55;color:var(--dim)}

  /* avatar select */
  .avgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin:14px 0}
  .avcard{cursor:pointer;text-align:center;background:var(--stage-2);border:1px solid var(--line);border-radius:13px;padding:16px 10px;transition:border-color .15s,transform .08s;color:var(--tungsten)}
  .avcard:hover{border-color:var(--dimmer)} .avcard:active{transform:translateY(1px)}
  .avcard[aria-pressed=true]{border-color:var(--green-deep);background:rgba(63,157,82,.1)}
  .avcard .face{width:58px;height:58px;margin:0 auto 9px;border-radius:50%;display:grid;place-items:center;font-size:28px;border:2px solid var(--stage)}
  .avcard .rn{font-weight:600;font-size:15px} .avcard .rd{font-size:12px;color:var(--dim);margin-top:3px;line-height:1.35}

  /* explorable world */
  .worldhud{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;color:var(--dim);margin:2px 2px 8px}
  .worldhud .sc{color:var(--green);font-weight:700} .worldhud .hint{margin-left:auto;color:var(--dimmer);font-size:11px;text-align:right}
  .worldwrap{position:relative;margin:2px 0 0;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#0b0f12}
  #gcanvas{display:block;width:100%;touch-action:none}

  /* in-world decision modal */
  .gmodal{position:fixed;inset:0;z-index:40;display:flex;align-items:flex-end;justify-content:center;background:rgba(8,7,6,.62);backdrop-filter:blur(3px)}
  .gmodal .sheet{width:100%;max-width:560px;max-height:90vh;overflow-y:auto;background:var(--stage-2);border:1px solid var(--line);border-radius:18px 18px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom));animation:rise .25s ease}
  @keyframes rise{from{transform:translateY(20px);opacity:.6}to{transform:none;opacity:1}}
  .gmodal .mh{display:flex;align-items:center;gap:11px;margin:0 0 4px}
  .gmodal .mh .ic{font-size:26px}
  .gmodal .mh .cd{font-family:var(--mono);font-size:11px;color:var(--key);letter-spacing:.1em}
  .gmodal h3{margin:2px 0 6px;font-size:20px;font-weight:600}
  .gmodal .mq{color:var(--dim);font-size:15px;line-height:1.5;margin:0 0 14px}
  .gmodal .close{background:none;border:0;color:var(--dim);font-family:var(--mono);font-size:12px;cursor:pointer;margin-top:6px}
  @media(min-width:560px){.gmodal{align-items:center}.gmodal .sheet{border-radius:18px}}
  .hide{display:none !important}
  @media (prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important}}
</style>
</head>
<body>
<video id="camera" playsinline muted autoplay></video>
<div id="scrim"></div>
<div class="ticks"><span class="tl"></span><span class="tr"></span><span class="bl"></span><span class="br"></span></div>

<div id="app">
  <div class="layer">
    <div class="hud" id="hud">
      <span class="rec"><b></b>REC</span>
      <span class="who" id="hudWho">— not signed in —</span>
      <span class="prog" id="hudProg">0/8</span>
      <span class="tc" id="hudTc">00:00</span>
    </div>
    <div class="scroll"><div class="wrap" id="screen"></div></div>
    <div class="dock hide" id="dock"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   GOING GREEN — studio sustainability field tool
   Self-contained. No build step. Works in any modern browser.
   ===================================================================== */

/* ---- 1. TEACHER CONFIG ------------------------------------------------
   Paste the Google Apps Script Web App URL below to collect every
   student's results into one central Google Sheet. Leave blank to run
   the app in offline mode (students export their own CSV/JSON).        */
const GOOGLE_ENDPOINT = ""; // e.g. "https://script.google.com/macros/s/AKfy.../exec"
/* --------------------------------------------------------------------- */

/* ---- 2. STATION CONTENT ---------------------------------------------
   Each station = one media-production technique. Interventions carry a
   weight (0=wasteful .. 100=sustainable) so the meter rewards reasoning,
   not naive "AI everywhere". Strong answers acknowledge trade-offs.    */
const STATIONS = [
  {
    id:1, code:"SET-01 / LIGHTING", name:"Lighting & power draw",
    tag:"Tungsten and HMI heat the room and the meter.",
    what:"A traditional key + fill + back-light setup in tungsten or HMI can pull 10–20kW for a single interview. Most of that energy becomes heat, which then drives air-conditioning load on top.",
    lever:"LED fixtures draw a fraction of the power and run cool. AI here is logistical, not generative: scheduling software can batch scenes by setup to cut re-lights, and smart metering flags fixtures left burning between takes.",
    q1:{ t:"What's the dominant sustainability impact at the lighting station?", opts:[
      {l:"Electricity demand — and the cooling load the heat creates", w:100, note:"Correct: energy is the headline, and heat doubles it via HVAC."},
      {l:"Plastic gel waste", w:35, note:"Real but minor next to power and cooling."},
      {l:"Noise pollution", w:10, note:"Not a material carbon impact."} ]},
    q2:{ t:"Pick the strongest intervention.", opts:[
      {l:"Switch to LED fixtures and meter usage between takes", w:100, note:"Biggest, lowest-regret cut."},
      {l:"AI-batch the shoot order so each setup is lit once", w:80, note:"Good logistical AI use; complements LED."},
      {l:"Keep tungsten but buy carbon offsets", w:25, note:"Offsets don't reduce the actual draw."} ]},
    est:{ label:"Estimate the energy cut from tungsten→LED for this setup", from:"0%", to:"~80%", default:55 }
  },
  {
    id:2, code:"SET-02 / VIRTUAL PRODUCTION", name:"Virtual production & chroma",
    tag:"The LED volume vs flying a crew to a location.",
    what:"An LED volume or green-screen stage replaces location travel and physically-built environments. It is power-hungry itself, but it removes flights, freight, per-diems and set strike for many shoots.",
    lever:"Generative and game-engine tools build the virtual environment instead of constructing and trucking a physical one. The win is real only when it displaces travel and material — running a volume for a shot you could have done in a room is a net loss.",
    q1:{ t:"Where does virtual production actually save carbon?", opts:[
      {l:"By displacing location travel, freight and physical set builds", w:100, note:"Exactly — the saving is in what it replaces."},
      {l:"By using less electricity than any other method", w:20, note:"No — a volume is power-intensive on its own."},
      {l:"By removing the need for any crew", w:10, note:"Crews are still required."} ]},
    q2:{ t:"When is virtual production the sustainable choice?", opts:[
      {l:"When it removes long-haul travel and a built-and-struck set", w:100, note:"Displacement is the test."},
      {l:"Always — it's digital, so it's clean", w:25, note:"Digital still draws power; check what it replaces."},
      {l:"Only for science-fiction projects", w:40, note:"Genre isn't the deciding factor."} ]},
    est:{ label:"Share of this production's travel + freight you'd avoid", from:"0%", to:"~70%", default:45 }
  },
  {
    id:3, code:"SET-03 / ART DEPARTMENT", name:"Set build & materials",
    tag:"Built, dressed, shot for a day, skipped.",
    what:"Physical sets consume timber, paint, polystyrene and steel, much of it single-use and landfilled at strike. The art department is one of the highest material-waste areas on a production.",
    lever:"AI previs and 3D models let teams test a set before cutting any material, so only what's needed is built. Combined with a reuse/hire-back store and modular flats, generative previs reduces speculative builds.",
    q1:{ t:"What drives the art department's footprint?", opts:[
      {l:"Single-use materials built, then sent to landfill at strike", w:100, note:"Waste at strike is the core problem."},
      {l:"The cost of paint", w:30, note:"Cost ≠ carbon; reuse matters more."},
      {l:"Designers' travel", w:20, note:"Minor compared with material waste."} ]},
    q2:{ t:"Best lever to cut material waste?", opts:[
      {l:"AI previs to build only what's confirmed, then hire-back/reuse flats", w:100, note:"Avoids speculative builds and landfill."},
      {l:"Build everything but recycle the timber", w:55, note:"Better than nothing; avoidance beats recycling."},
      {l:"Use AI to design more elaborate sets", w:15, note:"More build = more impact, not less."} ]},
    est:{ label:"Speculative build you'd avoid with previs + reuse", from:"0%", to:"~60%", default:40 }
  },
  {
    id:4, code:"SET-04 / LOGISTICS", name:"Transport & call sheets",
    tag:"Crew, kit and talent moving across the map.",
    what:"Travel is consistently the single largest line in a production's carbon footprint — unit moves, crew commutes, freight and talent flights. Idling vehicles and scattered locations multiply it.",
    lever:"This is the clearest win for non-generative AI: route- and load-optimisation, consolidated call sheets, ride-share matching and location clustering. The tool plans fewer, fuller journeys.",
    q1:{ t:"Which is typically the biggest single source of a shoot's emissions?", opts:[
      {l:"Transport — unit moves, commutes, freight and flights", w:100, note:"Travel usually tops the footprint."},
      {l:"On-set catering", w:30, note:"Material but rarely the largest."},
      {l:"Office electricity", w:15, note:"Small in comparison."} ]},
    q2:{ t:"Best use of AI here?", opts:[
      {l:"Route/load optimisation + consolidated call sheets to cut journeys", w:100, note:"Fewer, fuller trips — direct cut."},
      {l:"Generate AI images of the locations instead of scouting", w:45, note:"Helps scouting, but doesn't move production day."},
      {l:"Book extra vehicles so nobody waits", w:10, note:"Adds emissions." } ]},
    est:{ label:"Reduction in vehicle-trips from clustering + optimisation", from:"0%", to:"~50%", default:35 }
  },
  {
    id:5, code:"SET-05 / POWER", name:"Generators vs grid & battery",
    tag:"Where the soundstage actually gets its watts.",
    what:"Off-grid shoots lean on diesel generators that run near-continuously and often well below efficient load. On-set, that's a major fuel burn and local air-quality issue.",
    lever:"Grid tie-ins, battery hybrids and HVO biofuel cut or replace diesel. AI/IoT monitoring matches generator size to real-time load so units aren't oversized and idling.",
    q1:{ t:"What's wrong with the default generator approach?", opts:[
      {l:"Diesel runs continuously, often oversized and below efficient load", w:100, note:"Idling + oversizing wastes fuel and fouls air."},
      {l:"Generators are too quiet to notice", w:10, note:"Not the issue."},
      {l:"They take up parking", w:15, note:"Logistical, not the carbon point."} ]},
    q2:{ t:"Strongest power strategy?", opts:[
      {l:"Grid tie-in or battery hybrid, with load monitoring to right-size", w:100, note:"Replace/shrink the burn, then optimise it."},
      {l:"Keep diesel but monitor it with AI", w:60, note:"Monitoring helps; fuel switch helps more."},
      {l:"Add a second generator for redundancy", w:10, note:"Doubles the problem."} ]},
    est:{ label:"Diesel you'd displace with hybrid + grid + monitoring", from:"0%", to:"~75%", default:50 }
  },
  {
    id:6, code:"SET-06 / CATERING", name:"Catering & set waste",
    tag:"Feeding the unit without feeding landfill.",
    what:"Productions over-cater to be safe, generating significant food waste, plus single-use packaging, plastic bottles and disposable coffee cups across a shoot day.",
    lever:"AI demand-forecasting from headcounts and call times reduces over-ordering. Plant-forward menus, refill stations and compostable service close the rest of the gap.",
    q1:{ t:"What's the main impact of catering?", opts:[
      {l:"Over-ordering food waste plus single-use packaging", w:100, note:"Waste + packaging is the pairing to target."},
      {l:"The kitchen's electricity", w:30, note:"Minor next to waste."},
      {l:"Reusable plates", w:10, note:"Reusables are the solution, not the impact."} ]},
    q2:{ t:"Best combined intervention?", opts:[
      {l:"AI-forecast headcount to right-size orders + plant-forward + refill stations", w:100, note:"Cuts waste at source and packaging."},
      {l:"Order extra so there's always plenty", w:10, note:"Maximises waste."},
      {l:"Switch only the cups to compostable", w:45, note:"Helps, but ignores food waste." } ]},
    est:{ label:"Food + packaging waste avoided with forecasting + refills", from:"0%", to:"~55%", default:40 }
  },
  {
    id:7, code:"SET-07 / POST & DATA", name:"Post-production & storage",
    tag:"The footprint that lives in the render farm.",
    what:"Editing, VFX, rendering and long-term media storage consume real electricity in data centres. Duplicated rushes, redundant backups and idle render nodes quietly accumulate impact after the shoot wraps.",
    lever:"AI-assisted editing, smart transcoding and automated culling reduce render and storage load — but compute has its own footprint, so the gain depends on choosing a low-carbon cloud region and deleting what you don't need.",
    q1:{ t:"Where does post-production's footprint hide?", opts:[
      {l:"Render-farm energy and redundant long-term storage", w:100, note:"Compute + duplicated storage is the hidden cost."},
      {l:"The editor's desk lamp", w:10, note:"Negligible."},
      {l:"Printing call sheets", w:20, note:"Tiny by comparison."} ]},
    q2:{ t:"How should AI be used in post?", opts:[
      {l:"AI culling + smart transcoding on a low-carbon cloud region, then delete dupes", w:100, note:"Cuts load and is honest about compute cost."},
      {l:"Render everything at maximum quality 'just in case'", w:15, note:"Wastes compute and storage."},
      {l:"Keep every version forever on local drives", w:25, note:"Redundant storage adds up."} ]},
    est:{ label:"Render + storage load cut by culling and region choice", from:"0%", to:"~45%", default:30 }
  },
  {
    id:8, code:"SET-08 / GENERATIVE AI", name:"Generative content — with caveats",
    tag:"Synthesising shots instead of shooting them.",
    what:"Generative AI can produce b-roll, backgrounds, voice or concept assets in place of physically shooting them — potentially removing travel, build and crew days. But each model has its own energy and water footprint, plus rights and authenticity questions.",
    lever:"The sustainable use is targeted: replace the highest-footprint shots (a flown-in establishing aerial, a built environment) with synthesis, while accounting for the compute used and being transparent about it. Generating everything indiscriminately can cost more than it saves.",
    q1:{ t:"What's the honest sustainability case for generative AI?", opts:[
      {l:"It can displace high-footprint shoots, but its own compute must be counted", w:100, note:"Net saving only when displacement > compute cost."},
      {l:"It's free of any environmental cost because it's software", w:10, note:"Models consume energy and water."},
      {l:"It always beats shooting on every metric", w:25, note:"Only for genuinely high-footprint shots."} ]},
    q2:{ t:"Most defensible way to deploy it?", opts:[
      {l:"Target the highest-footprint shots, account for compute, disclose use", w:100, note:"Targeted + transparent + accounted."},
      {l:"Generate every asset to avoid all filming", w:30, note:"Indiscriminate use can erase the saving."},
      {l:"Use it only to make more content faster", w:20, note:"Volume isn't the sustainability goal." } ]},
    est:{ label:"Shoot footprint displaced by targeting only high-impact shots", from:"0%", to:"~50%", default:35 }
  }
];

/* ---- 2b. LOCATION SHOOT GAME ----------------------------------------
   A 10-marker walk-through of taking a Love-Island-style reality format
   to a remote island. At each marker the student picks a production
   decision scored 1–5 (5 = lowest impact). Perfect minimisation = 50.
   Each option carries an indicative impact value (teaching units, NOT
   audited tCO2e). The running location footprint is compared live with
   the virtual-production studio baseline. VP_BASELINE is the studio's
   own footprint: real power draw, minimal travel, no location/diesel.  */
const VP_BASELINE = 22; // indicative units — the LED-volume equivalent
const LOCATION_GAME = {
  title:"Sun & Sand Villa",
  premise:"Your reality format wants twelve singles on a remote tropical island for six weeks. Walk the production from greenlight to transmission. At each of the ten markers, pick how you'll do it. Greener decisions score more — minimise every one and you hit 50 / 50. Watch your location footprint against what the same show would cost in the virtual-production studio.",
  markers:[
    { code:"M01", title:"Location & recce", q:"How do you find and lock the island?",
      opts:[
        {l:"Fly several scouting trips to shortlisted islands", p:1, impact:8,  why:"Recce flights are pure overhead before a frame is shot."},
        {l:"One scout trip, then confirm remotely", p:3, impact:3,  why:"Cuts most recce travel without going fully virtual."},
        {l:"Virtual recce from existing footage and 3D survey", p:5, impact:1,  why:"Near-zero footprint — the VP mindset starts at planning."} ]},
    { code:"M02", title:"Cast & crew travel", q:"How do people get to set? (Usually the biggest line.)",
      opts:[
        {l:"Long-haul flights for a full 120-person unit", p:1, impact:40, why:"Travel is almost always the largest single source."},
        {l:"Trim the unit, fly core only, rail where possible", p:3, impact:18, why:"Fewer bodies + smarter modes cut the dominant line."},
        {l:"Shoot near base — crew travel locally, no flights", p:5, impact:4,  why:"Removing flights is the single biggest lever there is."} ]},
    { code:"M03", title:"Kit transport", q:"How does the camera, sound and rigging gear arrive?",
      opts:[
        {l:"Air-freight everything to hit the schedule", p:1, impact:20, why:"Air-freight is the most carbon-intensive way to move kit."},
        {l:"Sea-freight non-urgent kit, hire the rest locally", p:3, impact:8,  why:"Slower planning, far lower freight impact."},
        {l:"Use the stage's resident kit — almost nothing ships", p:5, impact:2,  why:"Local/stage kit erases the freight line."} ]},
    { code:"M04", title:"Power", q:"Where do the watts come from on a remote island?",
      opts:[
        {l:"Diesel generators running 24/7", p:1, impact:25, why:"Oversized diesel idling is a major burn and air-quality hit."},
        {l:"Battery hybrid + HVO biofuel, load-managed", p:3, impact:10, why:"Cuts and cleans the burn, but still off-grid."},
        {l:"Grid tie-in / stage mains", p:5, impact:3,  why:"Connecting to clean(er) grid power beats any generator."} ]},
    { code:"M05", title:"The villa / set", q:"How do you create the iconic villa?",
      opts:[
        {l:"Build a full villa structure on the island", p:1, impact:15, why:"New build = materials, freight and strike waste."},
        {l:"Dress an existing building, minimal new build", p:3, impact:6,  why:"Reuse avoids most of the material footprint."},
        {l:"Recreate the villa as a virtual set on the LED volume", p:5, impact:2,  why:"The look without the build — core virtual production."} ]},
    { code:"M06", title:"Accommodation", q:"Where do cast and crew stay for six weeks?",
      opts:[
        {l:"Sprawling resort, full occupancy for the run", p:1, impact:12, why:"Weeks of resort energy and water add up fast."},
        {l:"Efficient local lodging, shared transport", p:3, impact:5,  why:"Right-sized stay cuts the standing footprint."},
        {l:"Shoot near base — most crew sleep at home", p:5, impact:2,  why:"No production accommodation at all is the floor."} ]},
    { code:"M07", title:"Catering", q:"How do you feed the unit every day?",
      opts:[
        {l:"Fly in caterers and over-order to be safe", p:1, impact:8, why:"Imported food + over-catering is waste on waste."},
        {l:"Local, plant-forward menu, AI-forecast headcount", p:3, impact:4, why:"Forecasting right-sizes orders and cuts waste."},
        {l:"Base canteen — minimal extra catering footprint", p:5, impact:1, why:"Using existing facilities is hard to beat."} ]},
    { code:"M08", title:"Water & ecosystem", q:"What's your footprint on the island itself?",
      opts:[
        {l:"Heavy water use, build into a sensitive shoreline", p:1, impact:6, why:"Local ecosystem damage isn't on the carbon ledger but it's real."},
        {l:"Managed water + leave-no-trace site rules", p:3, impact:3, why:"Limits the on-site damage you do cause."},
        {l:"No location footprint — it's a stage", p:5, impact:1, why:"You can't disturb an ecosystem you never visit."} ]},
    { code:"M09", title:"Lighting the 'sun'", q:"How do you light for that golden-hour look?",
      opts:[
        {l:"Big HMI rigs to fake sun, plus AC to fight the heat", p:1, impact:10, why:"Hot fixtures drive cooling load on top of the draw."},
        {l:"LED fixtures topped up with natural light", p:3, impact:4, why:"Cool, efficient lighting cuts power and cooling."},
        {l:"Controlled LED-volume lighting, no AC battle", p:5, impact:2, why:"The volume gives repeatable light at low draw."} ]},
    { code:"M10", title:"Post & transmission", q:"How do rushes become a broadcast episode?",
      opts:[
        {l:"Ship duplicate drives, edit on the island, archive everything", p:1, impact:6, why:"Shipping + duplication + endless storage all cost energy."},
        {l:"Upload to a low-carbon cloud region, cull duplicates", p:3, impact:3, why:"Right region + housekeeping shrinks the data footprint."},
        {l:"Edit at base off the stage feed — minimal data movement", p:5, impact:1, why:"Keeping post close to source avoids most of it."} ]}
  ]
};
const LOC_MAX = LOCATION_GAME.markers.reduce((a,m)=>a+Math.max(...m.opts.map(o=>o.impact)),0);

/* ---- 3. STATE & STORAGE (localStorage with safe in-memory fallback) -- */
const KEY="goinggreen.v1";
let mem={};
const store={
  get(){ try{ const r=localStorage.getItem(KEY); return r?JSON.parse(r):null; }catch(e){ return mem[KEY]||null; } },
  set(v){ try{ localStorage.setItem(KEY, JSON.stringify(v)); }catch(e){ mem[KEY]=v; } }
};
let S = store.get() || { student:null, started:null, answers:{}, view:"list", route:"onboard", current:null, game:null };
function save(){ store.set(S); }

/* ---- 4. small helpers ------------------------------------------------ */
const $ = (s,r=document)=>r.querySelector(s);
const screen=$("#screen"), dock=$("#dock");
const esc=s=>(s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function toast(msg,err){ const t=$("#toast"); t.textContent=msg; t.className="toast show"+(err?" err":""); setTimeout(()=>t.className="toast",2600); }
function done(id){ const a=S.answers[id]; return a && a.q1!=null && a.q2!=null; }
function completedCount(){ return STATIONS.filter(s=>done(s.id)).length; }

/* station sustainability score 0..100 from the two choices + slider */
function stationScore(id){
  const a=S.answers[id]; if(!a||a.q1==null||a.q2==null) return null;
  const st=STATIONS.find(s=>s.id===id);
  const w1=st.q1.opts[a.q1].w, w2=st.q2.opts[a.q2].w;
  return Math.round(w1*0.4 + w2*0.6); // the intervention choice weighs most
}

/* ---- 5. timecode ----------------------------------------------------- */
function tc(){
  if(!S.started){ $("#hudTc").textContent="00:00"; return; }
  const s=Math.floor((Date.now()-S.started)/1000);
  $("#hudTc").textContent=String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
}
setInterval(tc,1000);

/* ---- 6. camera / AR view -------------------------------------------- */
let stream=null;
async function startAR(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"}},audio:false});
    $("#camera").srcObject=stream; document.body.classList.add("ar"); return true;
  }catch(e){ document.body.classList.remove("ar"); return false; }
}
function stopAR(){ if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; } document.body.classList.remove("ar"); }

/* ---- 7. HUD ---------------------------------------------------------- */
function syncHud(){
  $("#hudWho").textContent = S.student ? (S.student.name+(S.student.group?" · "+S.student.group:"")) : "— not signed in —";
  $("#hudProg").textContent = completedCount()+"/"+STATIONS.length;
}

/* ---- 8. ROUTING ------------------------------------------------------ */
function go(route, opt){
  S.route=route; if(opt!=null) S.current=opt; save();
  if(route!=="station"||S.view!=="ar") { if(route!=="station") {} }
  render();
}
function render(){
  syncHud();
  if(S.route!=="game") stopWorld();
  if(S.route==="onboard"){ stopAR(); renderOnboard(); }
  else if(S.route==="hub"){ S.view==="ar"?startAR():stopAR(); renderHub(); }
  else if(S.route==="station"){ S.view==="ar"?startAR():stopAR(); renderStation(S.current); }
  else if(S.route==="game"){ stopAR(); renderGame(); }
  else if(S.route==="summary"){ stopAR(); renderSummary(); }
}

/* ---- 9. SCREENS ------------------------------------------------------ */
function renderOnboard(){
  const st=S.student||{};
  screen.innerHTML=`
    <div class="hero">
      <div class="gels"><i style="background:#cd7a26"></i><i style="background:#2c8ea0"></i><i style="background:#3aa256"></i><i style="background:#9b8cff"></i></div>
      <span class="eyebrow">Studio sustainability field tool</span>
      <h1>Going&nbsp;Green</h1>
      <p class="tagline">Walk a media production studio and uncover where carbon, energy and waste hide — then decide how to address it, including where AI helps and where it doesn't. Your meter swings toward green as you make stronger calls.</p>
    </div>
    <div class="steps">
      <div class="st"><div class="n">01 · EXPLORE</div><div class="d">Visit eight production stations in list or AR camera view.</div></div>
      <div class="st"><div class="n">02 · DECIDE</div><div class="d">Complete each task and play the location-shoot game.</div></div>
      <div class="st"><div class="n">03 · SUBMIT</div><div class="d">Your results flow to the class's central sheet.</div></div>
    </div>
    <div class="panel" style="margin-top:18px">
      <h4>Sign in to start your walk</h4>
      <div class="field">
        <label class="lab" for="nm">Your name</label>
        <input id="nm" type="text" autocomplete="name" placeholder="e.g. Alex Chan" value="${esc(st.name||"")}">
      </div>
      <div class="row2">
        <div class="field">
          <label class="lab" for="sid">Student ID</label>
          <input id="sid" type="text" placeholder="e.g. u2401234" value="${esc(st.id||"")}">
        </div>
        <div class="field">
          <label class="lab" for="grp">Group / module</label>
          <input id="grp" type="text" placeholder="e.g. MA Media B" value="${esc(st.group||"")}">
        </div>
      </div>
      <p class="small" style="margin:2px 0 0">${GOOGLE_ENDPOINT?"Results submit to your class's central sheet at the end.":"Offline mode — you'll export your own results file at the end."}</p>
    </div>
    ${setupBlock()}
  `;
  const start=()=>{
    const name=$("#nm").value.trim();
    if(!name){ toast("Add your name to start",true); $("#nm").focus(); return; }
    S.student={ name, id:$("#sid").value.trim(), group:$("#grp").value.trim() };
    if(!S.started) S.started=Date.now();
    S.route="hub"; save(); render();
  };
  dock.classList.remove("hide");
  dock.innerHTML=`<span class="grow" style="font-family:var(--mono);font-size:12px;color:var(--dim)">Ready when you are</span><button class="btn primary" id="startBtn" style="min-width:200px">Start the studio walk →</button>`;
  $("#startBtn").onclick=start;
  $("#grp").onkeydown=e=>{ if(e.key==="Enter") start(); };
}

function renderHub(){
  const ART={
    1:{ic:"💡",ac:"#cd7a26"}, 2:{ic:"🎬",ac:"#2c8ea0"}, 3:{ic:"🧱",ac:"#c2603a"},
    4:{ic:"🚚",ac:"#c2971e"}, 5:{ic:"🔌",ac:"#3f76d6"}, 6:{ic:"🍽️",ac:"#3aa256"},
    7:{ic:"🖥️",ac:"#6d5ae0"}, 8:{ic:"🤖",ac:"#b25bc4"}
  };
  const cards=STATIONS.map(s=>{
    const d=done(s.id), sc=stationScore(s.id), art=ART[s.id]||{ic:"🎞️",ac:"#f2a65a"};
    return `<button class="slate" data-st="${s.id}" style="--ac:${art.ac}">
      <div class="stripe">${"<i></i>".repeat(12)}</div>
      <div class="body">
        <div class="htop">
          <div class="ic">${art.ic}</div>
          <div style="min-width:0">

function locFootprint(){
  // sum chosen impacts; unanswered markers count as worst-case (not yet decided)
  return LOCATION_GAME.markers.reduce((a,m,i)=>{
    const c=S.game.choices[i];
    return a + (c==null ? Math.max(...m.opts.map(o=>o.impact)) : m.opts[c].impact);
  },0);
}
function gameScore(){ return S.game.choices.reduce((a,c,i)=> a + (c==null?0:LOCATION_GAME.markers[i].opts[c].p), 0); }

function compareBars(){
  const loc=locFootprint();
  const locPct=Math.round(loc/LOC_MAX*100);
  const vpPct=Math.round(VP_BASELINE/LOC_MAX*100);
  return `<div class="vs">
    <div class="vbar loc">
      <div class="top"><span>LOCATION SHOOT</span><b>${loc} units</b></div>
      <div class="track"><div class="barfill" style="width:${locPct}%"></div><div class="vpline" style="left:${vpPct}%"></div></div>
    </div>

    </div>
  </div>
  <p class="small">Indicative teaching units — not audited tCO₂e. The white line marks the studio baseline; get your location bar down to it by minimising every decision.</p>`;
}

function renderWorld(){
  const G=LOCATION_GAME, av=AVATARS.find(a=>a.id===S.game.avatar)||AVATARS[0];
  dock.classList.remove("hide");
  dock.innerHTML=`<button class="btn" id="wExit">Leave</button><button class="btn" id="wCam"></button><span class="grow"></span><button class="btn primary" id="wFinish">Finish ▸</button>`;
  screen.innerHTML=`
    <div class="worldhud">
      <span>${esc(av.name)} · ${esc(av.role)}</span>
      <span class="sc" id="wScore">${gameScore()}/50</span>
      <span class="hint">Drag left ½ = move · right ½ = look · 📹/👁 toggle view</span>
    </div>
    <div class="worldwrap"><canvas id="gcanvas"></canvas></div>
    <p class="small" style="margin-top:8px">First-person walk: explore all 10 points of contact, then hit <b>Finish</b>. Head for the 🎬 door to step inside the LED-volume studio and see the same beach done virtually. On a laptop: <b>W/S</b> move, <b>A/D</b> or <b>←/→</b> turn.</p>
  `;
  $("#wExit").onclick=()=>{ stopWorld(); S.route="station"; S.current=2; save(); render(); };
  $("#wFinish").onclick=()=>{ S.game.finished=true; stopWorld(); save(); render(); };
  function camLabel(){ $("#wCam").textContent = world.cam==="follow" ? "📹 Follow-cam" : "👁 First-person"; }
  $("#wCam").onclick=()=>{ if(!world) return; world.cam = world.cam==="follow"?"fp":"follow"; S.game.cam=world.cam; save(); camLabel(); };

  const cv=$("#gcanvas"), ctx=cv.getContext("2d");
  const FOV=1.18, CULL=FOV/2+0.4, CAMH=42;
  const player={ x:PORTAL.x-120, y:PORTAL.y-150, a:-Math.PI/2, bob:0, moving:false };
  // face island centre on spawn
  player.a=Math.atan2(ISLAND.cy-player.y, ISLAND.cx-player.x);
  world={ alive:true, paused:false, scene:"island", lock:-1, portalLock:true, allDone:false,
          t:0, dpr:1, cssW:0, cssH:0, keys:{}, ptr:{}, movePtr:null, hits:[], prompt:null,
          cam:(S.game.cam==="fp"?"fp":"follow") };
  camLabel();

  function fit(){
    const rect=cv.parentElement.getBoundingClientRect();
    const cssW=Math.max(280, rect.width||320);
    const cssH=Math.max(320, Math.min(cssW*0.74, (window.innerHeight||640)-230));
    const dpr=Math.min(window.devicePixelRatio||1,2);
    cv.style.height=cssH+"px";
    cv.width=Math.round(cssW*dpr); cv.height=Math.round(cssH*dpr);
    world.dpr=dpr; world.cssW=cssW; world.cssH=cssH;
    world.focal=(cssW*0.5)/Math.tan(FOV/2);
  }
  fit();
  world.rz=()=>{ if(world) fit(); };
  window.addEventListener("resize",world.rz);

  // ---------- scene objects ----------
  function islandObjects(){
    const o=[];
    [[150,250],[850,300],[420,560],[680,150],[180,470],[760,470],[560,560],[330,200],[120,360]]
      .forEach(p=>o.push({x:p[0],y:p[1],kind:"emoji",glyph:"🌴",h:172}));
    [[640,440],[300,470]].forEach(p=>o.push({x:p[0],y:p[1],kind:"emoji",glyph:"🪨",h:64}));
    o.push({x:500,y:330,kind:"emoji",glyph:"🏠",h:214});
    o.push({x:PORTAL.x,y:PORTAL.y,kind:"portal",glyph:"🎬",label:"VP STUDIO",col:"#52b6c4",h:188});
    LOCATION_GAME.markers.forEach((m,i)=>o.push({x:MARK_POS[i].x,y:MARK_POS[i].y,kind:"marker",i:i,glyph:MARK_POS[i].icon,label:m.code,h:150}));
    return o;
  }
  function studioObjects(){
    const o=[];
    o.push({x:500,y:110,kind:"ledwall",w:540,h:250});
    o.push({x:420,y:470,kind:"emoji",glyph:"🎥",h:120});
    o.push({x:650,y:480,kind:"emoji",glyph:"📦",h:84});
    o.push({x:500,y:330,kind:"sign",glyph:"📉",label:"BASELINE 22u",col:"#6fcf73",h:150});
    o.push({x:STUDIO_PORTAL.x,y:STUDIO_PORTAL.y,kind:"portal",glyph:"🚪",label:"BACK TO ISLE",col:"#f2a65a",h:196});
    return o;
  }

  function clampScene(p){
    if(world.scene==="island"){
      const dx=(p.x-ISLAND.cx)/ISLAND.rx, dy=(p.y-ISLAND.cy)/ISLAND.ry, d=dx*dx+dy*dy;
      if(d>1){ const f=Math.sqrt(d); p.x=ISLAND.cx+(p.x-ISLAND.cx)/f; p.y=ISLAND.cy+(p.y-ISLAND.cy)/f; }
    } else { p.x=Math.max(110,Math.min(890,p.x)); p.y=Math.max(190,Math.min(600,p.y)); }
  }
  function norm(x){ while(x>Math.PI)x-=2*Math.PI; while(x<-Math.PI)x+=2*Math.PI; return x; }

  // ---------- input ----------
  function half(clientX){ const r=cv.getBoundingClientRect(); return (clientX-r.left) < world.cssW/2 ? "move":"look"; }
  cv.addEventListener("pointerdown",e=>{
    if(world.paused) return;
    const role=half(e.clientX);
    world.ptr[e.pointerId]={ role, sx:e.clientX, sy:e.clientY, cx:e.clientX, cy:e.clientY, lastX:e.clientX, moved:false };
    if(role==="move") world.movePtr=e.pointerId;
    try{ cv.setPointerCapture(e.pointerId); }catch(_){}
  });
  world.pm=e=>{
    const p=world.ptr[e.pointerId]; if(!p) return;
    if(Math.hypot(e.clientX-p.sx,e.clientY-p.sy)>8) p.moved=true;
    p.cx=e.clientX; p.cy=e.clientY;
    if(p.role==="look"){ player.a=norm(player.a + (e.clientX-p.lastX)*0.0052); p.lastX=e.clientX; }
  };
  world.pu=e=>{
    const p=world.ptr[e.pointerId]; if(!p) return;
    if(!p.moved){ // tap → examine a signpost under the finger
      const r=cv.getBoundingClientRect(), hx=e.clientX-r.left, hy=e.clientY-r.top;
      for(const h of world.hits){ if(h.i!=null && S.game.choices[h.i]==null && hx>=h.x&&hx<=h.x+h.w&&hy>=h.y&&hy<=h.y+h.hh){
        const d=Math.hypot(player.x-MARK_POS[h.i].x, player.y-MARK_POS[h.i].y); if(d<200){ openMarker(h.i); break; } } }
    }
    if(world.movePtr===e.pointerId) world.movePtr=null;
    delete world.ptr[e.pointerId];
  };
  window.addEventListener("pointermove",world.pm);
  window.addEventListener("pointerup",world.pu);
  world.kd=e=>{ const k=e.key.toLowerCase();
    if(["w","s","a","d","arrowup","arrowdown","arrowleft","arrowright","q","e"].includes(k)){ world.keys[k]=true; e.preventDefault(); } };
  world.ku=e=>{ world.keys[e.key.toLowerCase()]=false; };
  window.addEventListener("keydown",world.kd); window.addEventListener("keyup",world.ku);

  // ---------- update ----------
  function update(dt){
    const k=world.keys, SP=158, TURN=2.3;
    let fwd=0, strafe=0;
    if(k["w"]||k["arrowup"])fwd+=1; if(k["s"]||k["arrowdown"])fwd-=1;
    if(k["arrowleft"]||k["a"]) player.a=norm(player.a-TURN*dt);
    if(k["arrowright"]||k["d"]) player.a=norm(player.a+TURN*dt);
    if(k["q"])strafe-=1; if(k["e"])strafe+=1;
    if(world.movePtr!=null){ const p=world.ptr[world.movePtr]; if(p){
      fwd += Math.max(-1,Math.min(1,(p.sy-p.cy)/46));
      strafe += Math.max(-1,Math.min(1,(p.cx-p.sx)/46)); } }
    const mag=Math.hypot(fwd,strafe);
    if(mag>0.02){
      const fx=Math.cos(player.a), fy=Math.sin(player.a), rx=Math.cos(player.a+Math.PI/2), ry=Math.sin(player.a+Math.PI/2);
      player.x += (fx*fwd + rx*strafe)*SP*dt;
      player.y += (fy*fwd + ry*strafe)*SP*dt;
      player.moving=true; player.bob+=dt*7;
    } else player.moving=false;
    clampScene(player);

    // portal
    const portal = world.scene==="island"?PORTAL:STUDIO_PORTAL;
    const pd=Math.hypot(player.x-portal.x, player.y-portal.y);
    if(pd<48){ if(!world.portalLock){
      world.scene = world.scene==="island"?"studio":"island";
      if(world.scene==="studio"){ player.x=500; player.y=560; }
      else { player.x=PORTAL.x-120; player.y=PORTAL.y-150; }
      player.a=Math.atan2((world.scene==="studio"?160:ISLAND.cy)-player.y,(world.scene==="studio"?500:ISLAND.cx)-player.x);
      world.portalLock=true; world.keys={}; world.movePtr=null;
      toast(world.scene==="studio"?"Inside the LED-volume studio":"Back on location");
    }} else world.portalLock=false;

    // nearest undone marker (island), with facing
    world.prompt=null;
    if(world.scene==="island" && !world.paused){
      let best=-1,bestd=1e9;
      LOCATION_GAME.markers.forEach((m,i)=>{ if(S.game.choices[i]!=null) return;
        const dx=MARK_POS[i].x-player.x, dy=MARK_POS[i].y-player.y, d=Math.hypot(dx,dy);
        const ang=Math.abs(norm(Math.atan2(dy,dx)-player.a));
        if(d<78 && ang<0.7 && d<bestd){ best=i; bestd=d; } });
      if(world.lock>=0){ const d=Math.hypot(player.x-MARK_POS[world.lock].x, player.y-MARK_POS[world.lock].y); if(d>92) world.lock=-1; }
      if(best>=0){ world.prompt=LOCATION_GAME.markers[best].code; if(bestd<40 && best!==world.lock) openMarker(best); }
    }
    if(!world.allDone && S.game.choices.every(c=>c!=null)){ world.allDone=true; toast("All 10 points logged — hit Finish for your report"); }
    const sc=$("#wScore"); if(sc) sc.textContent=gameScore()+"/50";
  }

  // ---------- draw ----------
  function rr(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }

  function draw(){
    const c=ctx, W=world.cssW, H=world.cssH;
    c.save(); c.scale(world.dpr,world.dpr);
    const bob=player.moving?Math.sin(player.bob)*2.2:0;
    const hz=H*0.52+bob;
    const isle=world.scene==="island";

    // camera: first-person (POV) or follow-cam (trailing the visible avatar)
    const follow=world.cam==="follow";
    const fxh=Math.cos(player.a), fyh=Math.sin(player.a), rxh=Math.cos(player.a+Math.PI/2), ryh=Math.sin(player.a+Math.PI/2);
    const BACK=180, SIDE=22, camA=player.a;
    const camX=follow? player.x-fxh*BACK+rxh*SIDE : player.x;
    const camY=follow? player.y-fyh*BACK+ryh*SIDE : player.y;
    const camH=follow? 74 : CAMH;

    // sky
    const sky=c.createLinearGradient(0,0,0,hz);
    if(isle){ sky.addColorStop(0,"#7fc7d6"); sky.addColorStop(1,"#cfe9e4"); }
    else { sky.addColorStop(0,"#0c0e13"); sky.addColorStop(1,"#1a1e26"); }
    c.fillStyle=sky; c.fillRect(0,0,W,hz);
    // sun (island)
    if(isle){ const sa=norm(-2.2-camA); if(Math.abs(sa)<1.0){ const sx=W/2+Math.tan(sa)*world.focal;
      c.fillStyle="rgba(255,226,150,.95)"; c.beginPath(); c.arc(sx,hz-H*0.26,H*0.05,0,7); c.fill();
      c.globalAlpha=.18; c.beginPath(); c.arc(sx,hz-H*0.26,H*0.1,0,7); c.fill(); c.globalAlpha=1; } }
    // sea strip
    c.fillStyle=isle?"#2f8aa0":"#11151c"; c.fillRect(0,hz-5,W,6);
    // ground
    const gr=c.createLinearGradient(0,hz,0,H);
    if(isle){ gr.addColorStop(0,"#e3cd9f"); gr.addColorStop(1,"#c8ab73"); }
    else { gr.addColorStop(0,"#1c2029"); gr.addColorStop(1,"#0e1116"); }
    c.fillStyle=gr; c.fillRect(0,hz,W,H-hz);
    if(!isle){ c.strokeStyle="rgba(120,160,200,.10)"; c.lineWidth=1;
      for(let i=1;i<8;i++){ const yy=hz+(H-hz)*(i/8)*(i/8); c.beginPath(); c.moveTo(0,yy); c.lineTo(W,yy); c.stroke(); } }

    // collect + sort billboards (avatar added in follow-cam)
    const list=isle?islandObjects():studioObjects();
    if(follow) list.push({x:player.x,y:player.y,kind:"avatar",h:88});
    const objs=list.map(o=>{
      const dx=o.x-camX, dy=o.y-camY, dist=Math.max(1,Math.hypot(dx,dy));
      const ang=norm(Math.atan2(dy,dx)-camA);
      return {o,dist,ang};
    }).filter(p=>Math.abs(p.ang)<CULL).sort((a,b)=>b.dist-a.dist);

    world.hits=[];
    for(const p of objs){
      const sx=W/2+Math.tan(p.ang)*world.focal;
      const baseY=hz+(camH*world.focal)/p.dist;
      const sh=(p.o.h*world.focal)/p.dist;
      drawObject(c,p.o,sx,baseY,sh,p.dist);
    }

    // reticle + prompt
    c.fillStyle="rgba(237,230,216,.5)"; c.beginPath(); c.arc(W/2,hz+ (H-hz)*0.05,2.5,0,7); c.fill();
    if(world.prompt){ const t="▶ EXAMINE "+world.prompt; c.font="700 13px ui-monospace,monospace"; const tw=c.measureText(t).width;
      c.fillStyle="rgba(20,17,15,.82)"; rr(c,W/2-tw/2-12,H-58,tw+24,28,8); c.fill();
      c.fillStyle="#6fcf73"; c.textAlign="center"; c.textBaseline="middle"; c.fillText(t,W/2,H-44); }

    drawMeter(c); drawMinimap(c);
    // left move-stick feedback
    if(world.movePtr!=null){ const pt=world.ptr[world.movePtr]; if(pt){ const r=cv.getBoundingClientRect();
      const ox=pt.sx-r.left, oy=pt.sy-r.top, kx=pt.cx-r.left, ky=pt.cy-r.top;
      c.strokeStyle="rgba(237,230,216,.4)"; c.lineWidth=2; c.beginPath(); c.arc(ox,oy,30,0,7); c.stroke();
      c.fillStyle="rgba(111,207,115,.65)"; c.beginPath();
      c.arc(ox+Math.max(-30,Math.min(30,kx-ox)),oy+Math.max(-30,Math.min(30,ky-oy)),14,0,7); c.fill(); } }
    c.restore();
  }

  function icon(c,glyph,x,y,size){ c.font=size+"px serif"; c.textAlign="center"; c.textBaseline="alphabetic"; c.fillText(glyph,x,y); }

  function drawObject(c,o,sx,baseY,sh,dist){
    // shadow
    c.save(); c.globalAlpha=.22; c.fillStyle="#000"; c.beginPath(); c.ellipse(sx,baseY,Math.max(6,sh*0.22),Math.max(3,sh*0.08),0,0,7); c.fill(); c.restore();
    if(o.kind==="avatar"){
      const w=sh*0.4, top=baseY-sh*0.88, bobv=player.moving?Math.sin(player.bob)*sh*0.03:0;
      const swing=player.moving?Math.sin(player.bob)*w*0.22:0, lw=w*0.32, lh=sh*0.4;
      c.fillStyle="#2c2620";
      rr(c,sx-lw-w*0.04+swing, baseY-lh, lw, lh, lw*0.35); c.fill();
      rr(c,sx+w*0.04-swing, baseY-lh, lw, lh, lw*0.35); c.fill();
      c.fillStyle=av.color; rr(c,sx-w/2,top+bobv,w,sh*0.5,w*0.3); c.fill();           // back of body
      c.fillStyle="rgba(0,0,0,.16)"; rr(c,sx-w*0.24,top+sh*0.12+bobv,w*0.48,sh*0.26,5); c.fill(); // pack
      c.fillStyle="#e8c39a"; c.beginPath(); c.arc(sx,top-sh*0.02+bobv,w*0.33,0,7); c.fill(); // head
      c.fillStyle="#3a2c1d"; c.beginPath(); c.arc(sx,top-sh*0.05+bobv,w*0.35,Math.PI*0.85,Math.PI*2.15); c.fill(); // hair
      return;
    }
    if(o.kind==="emoji"){ icon(c,o.glyph,sx,baseY,Math.max(10,sh)); return; }
    if(o.kind==="ledwall"){ const w=(o.w*world.focal)/dist, x=sx-w/2, y=baseY-sh, h=sh;
      const g=c.createLinearGradient(0,y,0,y+h*0.82); g.addColorStop(0,"#6fd0e0"); g.addColorStop(.6,"#bfe6c8"); g.addColorStop(1,"#e9d4a8");
      c.fillStyle=g; rr(c,x,y,w,h*0.82,6); c.fill();
      c.fillStyle="#ffd98a"; c.beginPath(); c.arc(sx,y+h*0.3,Math.max(5,w*0.05),0,7); c.fill();
      c.fillStyle="#0e1116"; c.fillRect(x,y+h*0.82,w,h*0.18);
      c.strokeStyle="#2a2f3a"; c.lineWidth=Math.max(2,w*0.012); rr(c,x,y,w,h*0.82,6); c.stroke();
      c.fillStyle="rgba(20,17,15,.7)"; c.font="700 "+Math.max(8,sh*0.06)+"px ui-monospace,monospace"; c.textAlign="center"; c.textBaseline="middle";
      c.fillStyle="#1a2230"; c.fillText("VIRTUAL BEACH · LED VOLUME",sx,y+h*0.9); return; }
    // marker signpost / sign / portal: post + panel
    const done=o.kind==="marker" && S.game.choices[o.i]!=null;
    const col=done?"#6fcf73":(o.col||"#f2d27a");
    const postW=Math.max(2,sh*0.05), panelW=Math.max(28,sh*0.62), panelH=Math.max(20,sh*0.34);
    const postTop=baseY-sh*0.55;
    c.fillStyle="#6b563c"; c.fillRect(sx-postW/2,postTop,postW,baseY-postTop);
    const px=sx-panelW/2, py=postTop-panelH*0.72;
    c.fillStyle="rgba(20,17,15,.78)"; rr(c,px,py,panelW,panelH,7); c.fill();
    c.strokeStyle=col; c.lineWidth=Math.max(1.5,sh*0.018); rr(c,px,py,panelW,panelH,7); c.stroke();
    icon(c,done?"✅":o.glyph,sx,py+panelH*0.62,Math.max(12,panelH*0.5));
    c.fillStyle=col; c.font="700 "+Math.max(7,panelH*0.2)+"px ui-monospace,monospace"; c.textAlign="center"; c.textBaseline="alphabetic";
    c.fillText(o.label,sx,py+panelH-4);
    if(o.kind==="marker"){ world.hits.push({x:px,y:py,w:panelW,hh:panelH+(baseY-postTop),i:o.i}); }
    if(o.kind==="portal"){ c.globalAlpha=.5; c.fillStyle=col; rr(c,px-3,py-3,panelW+6,panelH+6,9); c.globalAlpha=1; }
  }

  function drawMeter(c){
    const loc=locFootprint(), w=150, x=12, y=12;
    c.save();
    c.fillStyle="rgba(20,17,15,.78)"; rr(c,x,y,w+16,52,9); c.fill();
    c.strokeStyle="#3a3128"; c.lineWidth=1; c.stroke();
    c.fillStyle="#a89a86"; c.font="700 9px ui-monospace,monospace"; c.textAlign="left"; c.textBaseline="alphabetic";
    c.fillText("LOCATION "+loc+"u",x+8,y+15);
    const bx=x+8,bw=w;
    c.fillStyle="#0c0a08"; rr(c,bx,y+19,bw,8,4); c.fill();
    const grd=c.createLinearGradient(bx,0,bx+bw,0); grd.addColorStop(0,"#6fcf73"); grd.addColorStop(.55,"#d9c25a"); grd.addColorStop(1,"#f2a65a");
    c.fillStyle=grd; rr(c,bx,y+19,Math.max(4,bw*loc/LOC_MAX),8,4); c.fill();
    const vpx=bx+bw*VP_BASELINE/LOC_MAX; c.fillStyle="#ede6d8"; c.fillRect(vpx-1,y+17,2,12);
    c.fillStyle="#52b6c4"; c.font="700 9px ui-monospace,monospace"; c.fillText("STUDIO BASELINE "+VP_BASELINE+"u",x+8,y+44);
    c.restore();
  }
  function drawMinimap(c){
    if(world.scene!=="island") return;
    const W=world.cssW, S0=Math.min(118,W*0.32), x=W-S0-12, y=12, pad=10;
    c.save();
    c.fillStyle="rgba(20,17,15,.72)"; rr(c,x,y,S0,S0,10); c.fill(); c.strokeStyle="#3a3128"; c.lineWidth=1; c.stroke();
    const mx=v=>x+pad+(v/1000)*(S0-2*pad), my=v=>y+pad+(v/680)*(S0-2*pad);
    c.strokeStyle="rgba(159,191,106,.6)"; c.lineWidth=1.5; c.beginPath();
    c.ellipse(mx(ISLAND.cx),my(ISLAND.cy),(ISLAND.rx/1000)*(S0-2*pad),(ISLAND.ry/680)*(S0-2*pad),0,0,7); c.stroke();
    MARK_POS.forEach((p,i)=>{ c.fillStyle=S.game.choices[i]!=null?"#6fcf73":"#f2d27a"; c.beginPath(); c.arc(mx(p.x),my(p.y),2.4,0,7); c.fill(); });
    c.fillStyle="#52b6c4"; c.beginPath(); c.arc(mx(PORTAL.x),my(PORTAL.y),2.6,0,7); c.fill();
    // player triangle
    const px=mx(player.x), py=my(player.y), a=player.a;
    c.fillStyle="#ede6d8"; c.beginPath();
    c.moveTo(px+Math.cos(a)*6,py+Math.sin(a)*6);
    c.lineTo(px+Math.cos(a+2.5)*4,py+Math.sin(a+2.5)*4);
    c.lineTo(px+Math.cos(a-2.5)*4,py+Math.sin(a-2.5)*4);
    c.closePath(); c.fill();
    c.restore();
  }

  // ---------- loop ----------
  let last=performance.now();
  function loop(now){
    if(!world||!world.alive) return;
    const dt=Math.min(0.05,(now-last)/1000); last=now; world.t+=dt;
    if(!world.paused) update(dt);
    draw();
    world.raf=requestAnimationFrame(loop);
  }
  world.raf=requestAnimationFrame(loop);
}
/* in-world decision modal for a point of contact */
function openMarker(i){
  if(!world) return;
  world.paused=true; world.lock=i; world.keys={}; world.movePtr=null; world.ptr={};
  const m=LOCATION_GAME.markers[i], pos=MARK_POS[i];
  const host=document.getElementById("app");
  const wrap=document.createElement("div"); wrap.className="gmodal"; wrap.id="gmodal";
  wrap.innerHTML=`<div class="sheet">
    <div class="mh"><span class="ic">${pos.icon}</span><div><div class="cd">${esc(m.code)} · POINT OF CONTACT ${i+1}/10</div></div></div>
    <h3>${esc(m.title)}</h3>
    <p class="mq">${esc(m.q)}</p>
    <div id="mopts">${m.opts.map((o,k)=>`<button class="opt" data-k="${k}">
      <span class="mk"></span><span class="ot">${esc(o.l)}</span><span class="pe">${o.p}/5</span></button>`).join("")}</div>
    <div id="mfb"></div>
    <button class="close" id="mClose">Decide later — keep exploring</button>
  </div>`;
  host.appendChild(wrap);
  const finish=()=>{ wrap.remove(); world.paused=false; };
  $("#mClose",wrap).onclick=finish;
  wrap.querySelectorAll(".opt").forEach(b=> b.onclick=()=>{
    const k=+b.dataset.k, o=m.opts[k];
    S.game.choices[i]=k; save();
    wrap.querySelectorAll(".opt").forEach(x=>{ x.setAttribute("aria-pressed", x===b); x.disabled=true; });
    $("#mfb",wrap).innerHTML=`<div class="feedback"><span class="p">+${o.p}</span>${esc(o.why)}</div>
      <button class="btn primary block" id="mGo" style="margin-top:12px">Continue exploring →</button>`;
    $("#mGo",wrap).onclick=finish;
    $("#mClose",wrap).style.display="none";
  });
}


function renderSummary(){
  dock.classList.add("hide");
  const scored=STATIONS.map(s=>({s,sc:stationScore(s.id)}));
  const done=scored.filter(x=>x.sc!=null);
  const overall = done.length? Math.round(done.reduce((a,x)=>a+x.sc,0)/done.length) : 0;
  const rows=scored.map(x=>`
    <div class="lr">
      <span class="nm">${esc(x.s.code.split(" / ")[1]||x.s.name)}</span>
      <span class="vv ${x.sc==null?"miss":""}">${x.sc==null?"not done":x.sc+" / 100"}</span>
    </div>`).join("");
  screen.innerHTML=`
    <button class="back" id="back">← back to stations</button>
    <span class="eyebrow">${esc(S.student.name)} · field report</span>
    <h2 style="margin-top:8px">Your sustainability reading</h2>
    <div class="bigscore"><span class="n">${overall}</span><span class="d">/ 100 average · ${done.length}/${STATIONS.length} stations</span></div>
    <p class="small">Higher means you consistently identified the real impact and chose interventions that reduce it — including using AI where it genuinely helps and avoiding it where it doesn't.</p>
    <div class="ledger">${rows}</div>
    <button class="btn primary block" id="submit">${GOOGLE_ENDPOINT?"Submit to class sheet":"Finish & export results"}</button>
    <div class="row2" style="margin-top:11px">
      <button class="btn" id="csv">Download CSV</button>
      <button class="btn" id="json">Download JSON</button>
    </div>
    <p class="small" style="margin-top:12px">${done.length<STATIONS.length?"You can still go back and complete the remaining stations before submitting.":"All stations complete — nice work."}</p>
    ${setupBlock()}
  `;
  $("#back").onclick=()=>{ S.route="hub"; save(); render(); };
  $("#submit").onclick=submitResults;
  $("#csv").onclick=()=>downloadFile(toCSV(),"going-green-results.csv","text/csv");
  $("#json").onclick=()=>downloadFile(JSON.stringify(buildRecord(),null,2),"going-green-results.json","application/json");
}

function setupBlock(){
  return `<details class="setup">
    <summary>Teacher setup — central results collection</summary>
    <p>To collect every student's results into one Google Sheet, create a Google Apps Script Web App and paste its URL into <code>GOOGLE_ENDPOINT</code> at the top of this file. The full script and steps are in the chat alongside this app. With no endpoint set, the app runs offline and students export their own CSV/JSON.</p>
  </details>`;
}

/* ---- 10. RESULTS: build / submit / export --------------------------- */
function buildRecord(){
  const rec={
    submittedAt:new Date().toISOString(),
    name:S.student?.name||"", studentId:S.student?.id||"", group:S.student?.group||"",
    durationSec: S.started? Math.floor((Date.now()-S.started)/1000):0,
    completed: completedCount(), totalStations: STATIONS.length,
    device: navigator.userAgent
  };
  let sum=0,n=0;
  STATIONS.forEach(s=>{
    const a=S.answers[s.id]||{}; const sc=stationScore(s.id);
    rec["s"+s.id+"_name"]=s.name;
    rec["s"+s.id+"_impact"]= a.q1!=null? s.q1.opts[a.q1].l : "";
    rec["s"+s.id+"_intervention"]= a.q2!=null? s.q2.opts[a.q2].l : "";
    rec["s"+s.id+"_estimate"]= a.est!=null? a.est : "";
    rec["s"+s.id+"_reflection"]= a.reflect||"";
    rec["s"+s.id+"_score"]= sc==null? "" : sc;
    if(sc!=null){ sum+=sc; n++; }
  });
  rec.overallScore = n? Math.round(sum/n):0;
  // Location Shoot game results — always emit the same columns
  const played = !!(S.game && S.game.done);
  let lf=0; if(played) LOCATION_GAME.markers.forEach((m,i)=>{ const c=S.game.choices[i]; lf += (c==null?Math.max(...m.opts.map(o=>o.impact)):m.opts[c].impact); });
  rec.gameScore = played ? (S.game.score + " / 50") : "not played";
  rec.gameLocationFootprint = played ? lf : "";
  rec.gameVPbaseline = played ? VP_BASELINE : "";
  rec.gameChoices = played ? LOCATION_GAME.markers.map((m,i)=>{ const c=S.game.choices[i]; return m.code+":"+(c==null?"-":m.opts[c].p); }).join(" ") : "";
  return rec;
}
function toCSV(){
  const r=buildRecord(); const keys=Object.keys(r);
  const q=v=>'"'+String(v).replace(/"/g,'""')+'"';
  return keys.map(q).join(",")+"\n"+keys.map(k=>q(r[k])).join(",");
}
function downloadFile(text,name,type){
  const blob=new Blob([text],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1500); toast("Downloaded "+name);
}
async function submitResults(){
  if(completedCount()===0){ toast("Complete at least one station first",true); return; }
  const rec=buildRecord();
  if(!GOOGLE_ENDPOINT){ downloadFile(JSON.stringify(rec,null,2),"going-green-results.json","application/json"); toast("Saved your results file"); return; }
  const btn=$("#submit"); btn.disabled=true; btn.textContent="Submitting…";
  try{
    await fetch(GOOGLE_ENDPOINT,{ method:"POST", mode:"no-cors",
      headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(rec) });
    btn.textContent="Submitted ✓"; toast("Results sent to the class sheet");
  }catch(e){
    btn.disabled=false; btn.textContent="Retry submit";
    downloadFile(JSON.stringify(rec,null,2),"going-green-results.json","application/json");
    toast("Couldn't reach the sheet — saved a backup file instead",true);
  }
}

/* ---- 11. deep link ?station=N + boot -------------------------------- */
(function boot(){
  const p=new URLSearchParams(location.search);
  const st=+p.get("station");
  if(S.student && st && STATIONS.find(x=>x.id===st)){ S.route="station"; S.current=st; S.view="ar"; }
  render(); tc();
})();
